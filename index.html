<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery with Filters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

<div class="container text-center my-4">
    <h2 class="mb-4">Image Gallery with Filters</h2>
    <div class="btn-group filter-buttons">
        <button class="btn btn-primary filter" data-filter="all">All</button>
        <button class="btn btn-outline-primary filter" data-filter="nature">Nature</button>
        <button class="btn btn-outline-primary filter" data-filter="animals">Animals</button>
        <button class="btn btn-outline-primary filter" data-filter="architecture">Architecture</button>
    </div>

    <div class="row mt-4 gallery">
        <div class="col-md-4 gallery-item nature">
            <div class="image-container">
                <img src="/Images/nature1.jpg" class="img-fluid" alt="Nature 1">
                <div class="overlay"><p>Nature 1</p></div>
            </div>
        </div>
        <div class="col-md-4 gallery-item animals">
            <div class="image-container">
                <img src="/Images/animals1.jpg" class="img-fluid" alt="Animals 1">
                <div class="overlay"><p>Animals 1</p></div>
            </div>
        </div>
        <div class="col-md-4 gallery-item architecture">
            <div class="image-container">
                <img src="/Images/architecture1.jpg" class="img-fluid" alt="Architecture 1">
                <div class="overlay"><p>Architecture 1</p></div>
            </div>
        </div>
        <div class="col-md-4 gallery-item nature">
            <div class="image-container">
                <img src="/Images/nature2.jpg" class="img-fluid" alt="Nature 2">
                <div class="overlay"><p>Nature 2</p></div>
            </div>
        </div>
        <div class="col-md-4 gallery-item animals">
            <div class="image-container">
                <img src="/Images/animals2.jpg" class="img-fluid" alt="Animals 2">
                <div class="overlay"><p>Animals 2</p></div>
            </div>
        </div>
        <div class="col-md-4 gallery-item architecture">
            <div class="image-container">
                <img src="/Images/architecture2.jpg" class="img-fluid" alt="Architecture 2">
                <div class="overlay"><p>Architecture 2</p></div>
            </div>
        </div>
    </div>
</div>

<script src="./scripts/script.js"></script>
</body>
</html>
